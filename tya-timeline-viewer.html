<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TYA Timeline Viewer</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      margin: 0;
      padding: 24px;
    }
    h1 { font-size: 1.4rem; margin-bottom: 4px; color: #7dd3fc; }
    .meta { font-size: 0.8rem; color: #64748b; margin-bottom: 24px; }
    .drop-zone {
      border: 2px dashed #334155;
      border-radius: 8px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
      margin-bottom: 24px;
    }
    .drop-zone:hover, .drop-zone.drag-over { border-color: #7dd3fc; }
    .drop-zone label { cursor: pointer; color: #94a3b8; font-size: 0.95rem; }
    .drop-zone input[type=file] { display: none; }
    #charts { display: flex; flex-direction: column; gap: 32px; }
    .chart-card {
      background: #1e293b;
      border-radius: 8px;
      padding: 20px;
    }
    .chart-card h2 { font-size: 1rem; margin: 0 0 16px; color: #93c5fd; }
    canvas { max-height: 320px; }
    #summary {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .stat-card {
      background: #1e293b;
      border-radius: 8px;
      padding: 14px 20px;
      min-width: 140px;
    }
    .stat-card .label { font-size: 0.72rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-card .value { font-size: 1.5rem; font-weight: 600; color: #7dd3fc; }
  </style>
</head>
<body>
  <h1>TYA Timeline Viewer</h1>
  <p class="meta">Load a <code>tya-timeline-*.json</code> file produced by <code>tya run</code>.</p>

  <div class="drop-zone" id="dropZone">
    <label for="fileInput">
      Drop <code>tya-timeline-*.json</code> here, or click to browse
      <input type="file" id="fileInput" accept=".json" />
    </label>
  </div>

  <div id="summary"></div>
  <div id="charts"></div>

  <script>
    const PALETTE = [
      '#38bdf8', '#f472b6', '#4ade80', '#fb923c',
      '#a78bfa', '#facc15', '#34d399', '#f87171',
    ];

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) loadFile(file);
    });
    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) loadFile(fileInput.files[0]);
    });

    function loadFile(file) {
      const reader = new FileReader();
      reader.onload = e => {
        try {
          render(JSON.parse(e.target.result));
        } catch {
          alert('Invalid JSON file.');
        }
      };
      reader.readAsText(file);
    }

    function render(data) {
      document.getElementById('summary').innerHTML = '';
      document.getElementById('charts').innerHTML = '';

      const flows = data.flows || [];

      // ── Summary stats ──────────────────────────────────────────────────────
      const summaryEl = document.getElementById('summary');

      const addStat = (label, value) => {
        const el = document.createElement('div');
        el.className = 'stat-card';
        el.innerHTML = `<div class="label">${label}</div><div class="value">${value}</div>`;
        summaryEl.appendChild(el);
      };

      addStat('Run ID', (data.run_id || '—').slice(-8));
      addStat('Started', data.started_at ? new Date(data.started_at).toLocaleTimeString() : '—');
      addStat('Flows', flows.length);

      let totalReqs = 0, totalErrs = 0;
      for (const f of flows) {
        for (const pt of (f.timeline || [])) {
          totalReqs += pt.requests;
          totalErrs += pt.errors;
        }
      }
      addStat('Total requests', totalReqs.toLocaleString());
      addStat('Total errors', totalErrs.toLocaleString());
      if (totalReqs > 0) {
        addStat('Error rate', (totalErrs / totalReqs * 100).toFixed(1) + '%');
      }

      // ── Per-flow charts ────────────────────────────────────────────────────
      const chartsEl = document.getElementById('charts');

      // Combined chart: all flows on one canvas.
      if (flows.length > 1) {
        chartsEl.appendChild(buildCard('All Flows — Requests / s', flows, false));
        chartsEl.appendChild(buildCard('All Flows — Errors / s', flows, true));
      }

      // Individual flow charts.
      for (const flow of flows) {
        chartsEl.appendChild(buildCard(`${flow.name} — Requests / s`, [flow], false));
        if (flow.timeline && flow.timeline.some(pt => pt.errors > 0)) {
          chartsEl.appendChild(buildCard(`${flow.name} — Errors / s`, [flow], true));
        }
      }
    }

    function buildCard(title, flows, errMode) {
      const card = document.createElement('div');
      card.className = 'chart-card';
      card.innerHTML = `<h2>${title}</h2>`;
      const canvas = document.createElement('canvas');
      card.appendChild(canvas);

      const maxLen = Math.max(...flows.map(f => (f.timeline || []).length));
      const labels = Array.from({ length: maxLen }, (_, i) => `${i + 1}s`);

      const datasets = flows.map((flow, idx) => {
        const color = PALETTE[idx % PALETTE.length];
        const pts = flow.timeline || [];
        return {
          label: flow.name,
          data: pts.map(pt => errMode ? pt.errors : pt.requests),
          borderColor: color,
          backgroundColor: color + '22',
          fill: true,
          tension: 0.3,
          pointRadius: maxLen > 120 ? 0 : 3,
          borderWidth: 2,
        };
      });

      new Chart(canvas, {
        type: 'line',
        data: { labels, datasets },
        options: {
          responsive: true,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { labels: { color: '#94a3b8' } },
            tooltip: {
              callbacks: {
                label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y} req/s`,
              },
            },
          },
          scales: {
            x: {
              ticks: { color: '#64748b', maxTicksLimit: 20 },
              grid: { color: '#1e293b' },
              title: { display: true, text: 'Elapsed (s)', color: '#64748b' },
            },
            y: {
              beginAtZero: true,
              ticks: { color: '#64748b' },
              grid: { color: '#334155' },
              title: { display: true, text: errMode ? 'Errors / s' : 'Requests / s', color: '#64748b' },
            },
          },
        },
      });

      return card;
    }
  </script>
</body>
</html>
