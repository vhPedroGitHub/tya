################################################################################
# config-run-1-get-all-delete-all.yml
#
# Demonstrates:
#   - alone flow with NO rps / NO duration → runs exactly once (single-pass)
#   - Extracting a full array from a response and expanding each element into
#     the GlobalBucket list using expand: true
#   - iterate flow consuming that list and calling DELETE for every person
#
# Flow sequence:
#   1. seed-persons       → creates 5 persons; each full object → global_list
#   2. fetch-page         → alone / single-pass: GET /persons?limit=5, expand
#                           the data array into a second list of IDs
#   3. delete-all-persons → iterate the seed list and DELETE each person
################################################################################

base_url: http://localhost:8080

auth_profiles:
  - name: app-user
    type: custom_login
    login_endpoint: /auth/login
    method: POST
    payload: |
      { "email": "${TEST_USER}", "password": "${TEST_PASS}" }
    extract_token:
      access_token:  response.body.access_token
      refresh_token: response.body.refresh_token
      expires_in:    response.body.expires_in
    refresh_endpoint: /auth/refresh
    refresh_method: POST
    refresh_payload: |
      { "refresh_token": "{{ .refresh_token }}" }
    refresh_extract:
      access_token:  response.body.access_token
      refresh_token: response.body.refresh_token
      expires_in:    response.body.expires_in

flows:
  # ── Step 1: create 5 tagged persons and save their full objects ────────────
  - name: seed-persons
    type: end-to-end
    duration: 5s
    requests_per_second: 1
    auth: app-user
    steps:
      - id: create-person
        endpoint: /persons
        method: POST
        payload_strategy: template
        payload_template: |
          {
            "first_name": "GetAll",
            "last_name":  "DeleteAll",
            "email":      "getall-{{ randomUUID }}@demo.dev",
            "phone":      "+1-555-{{ randomDigits 4 }}"
          }
        extract:
          - field: response.body
            as: person
            global_list: true   # save full object

  # ── Step 2: GET /persons?limit=5 once and expand the data[] into a list ───
  # This demonstrates the core feature: a single GET whose array response is
  # expanded element-by-element into the bucket.
  - name: fetch-page
    type: alone          # no rps, no duration → single-pass automatically
    auth: app-user
    depends_on:
      - seed-persons
    steps:
      - id: list-first-page
        endpoint: /persons?limit=5&offset=0
        method: GET
        extract:
          - field: response.body.data   # the []person array from the page
            as: page_persons
            global_list: true
            expand: true               # each person object → individual bucket entry

  # ── Step 3: delete every person created in seed-persons ───────────────────
  - name: delete-seeded-persons
    type: iterate
    auth: app-user
    depends_on:
      - fetch-page
    iterate_list: seed-persons.person    # full objects from seed
    item_variable: person
    steps:
      - id: delete-person
        endpoint: /persons/{{ index .person "id" }}
        method: DELETE
