name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
          BIN="tya${EXT}"
          VERSION="${{ github.event.release.tag_name }}"
          DIR="tya-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p "${DIR}"
          go build \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "${DIR}/${BIN}" \
            ./cmd/tya/cli
          cp README.md "${DIR}/"
          cp docs/getting-started.md "${DIR}/"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            zip -r "tya-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}.zip" "${DIR}"
          else
            tar -czf "tya-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" "${DIR}"
          fi

      - name: Upload binary asset
        uses: softprops/action-gh-release@v2
        with:
          files: tya-${{ github.event.release.tag_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.*

  package-scripts:
    name: Package Python scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: ver
        run: echo "version=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"

      - name: Build packages
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          DIR="tya-scripts-${VERSION}"
          mkdir -p "${DIR}"
          cp scripts/tya-report-pdf.py "${DIR}/"
          cp scripts/requirements.txt "${DIR}/"
          cp README.md "${DIR}/"

          # tar.gz
          tar -czf "${DIR}.tar.gz" "${DIR}"

          # zip
          zip -r "${DIR}.zip" "${DIR}"

      - name: Upload script assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tya-scripts-${{ steps.ver.outputs.version }}.tar.gz
            tya-scripts-${{ steps.ver.outputs.version }}.zip
